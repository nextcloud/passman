sonar.projectKey=Passman
sonar.qualitygate.wait=true
sonar.sources=./
sonar.exclusions=./l10n,./tests,./css
sonar.language=php
sonar.php.coverage.reportPaths=build/php-unit.clover

sonar.issue.ignore.multicriteria=e1
